<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>勇者ようたの大冒険</title>
<style>
body{margin:0;background:#1b2430;color:#fff;font-family:sans-serif;text-align:center}
#hud{padding:8px;font-weight:bold}
canvas{background:#243447;border:2px solid gold;max-width:100vw;touch-action:none}
#controls{display:flex;justify-content:center;gap:12px;margin:8px}
button{width:90px;height:60px;font-size:28px;border:none;border-radius:12px}
#attack{width:120px}
</style>
</head>
<body>
<div id="hud">❤️HP:<span id="hp">3</span> | 🏆スコア:<span id="score">0</span> | ⭐Lv:<span id="level">1</span> | 👑最高:<span id="best">0</span></div>
<canvas id="game" width="400" height="600"></canvas>
<div id="controls">
<button id="left">◀</button>
<button id="attack">⚔️</button>
<button id="right">▶</button>
</div>

<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
const hpEl=hp,scoreEl=score,levelEl=level,bestEl=best;

let left=false,right=false,attacking=false;
let hero,enemies,coins,score,hpv,levelv,gameOver;

const bestScore=localStorage.getItem("hero_best")||0;
bestEl.textContent=bestScore;

function reset(){
 hero={x:180,y:520,size:40};
 enemies=[]; coins=[];
 score=0; hpv=3; levelv=1; gameOver=false;
 updateHud();
}
function updateHud(){
 hpEl.textContent=hpv;
 scoreEl.textContent=score;
 levelEl.textContent=levelv;
}
reset();

function press(id,val){
 document.getElementById(id).addEventListener("touchstart",e=>{e.preventDefault();window[val]=true;});
 document.getElementById(id).addEventListener("touchend",e=>{e.preventDefault();window[val]=false;});
 document.getElementById(id).addEventListener("mousedown",()=>window[val]=true);
 document.getElementById(id).addEventListener("mouseup",()=>window[val]=false);
}
press("left","left");
press("right","right");

function atkStart(){attacking=true;setTimeout(()=>attacking=false,250);}
attack.addEventListener("touchstart",e=>{e.preventDefault();atkStart();});
attack.addEventListener("click",atkStart);

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") left=true;
 if(e.key==="ArrowRight") right=true;
 if(e.code==="Space") atkStart();
});
document.addEventListener("keyup",e=>{
 if(e.key==="ArrowLeft") left=false;
 if(e.key==="ArrowRight") right=false;
});

function spawnEnemy(){
 const em=["👹","💀","🦇","🐉"];
 enemies.push({
  x:Math.random()*360,y:-40,s:40,
  e:em[Math.floor(Math.random()*em.length)],
  speed:2+Math.random()*levelv
 });
}
function spawnCoin(){
 coins.push({x:Math.random()*360,y:-20,speed:3});
}
setInterval(()=>{if(!gameOver)spawnEnemy();},900);
setInterval(()=>{if(!gameOver)spawnCoin();},3000);

function hit(a,b){
 return a.x<b.x+b.s && a.x+a.size>b.x &&
        a.y<b.y+b.s && a.y+a.size>b.y;
}

function update(){
 if(gameOver) return;

 if(left) hero.x-=6;
 if(right) hero.x+=6;
 hero.x=Math.max(0,Math.min(360,hero.x));

 enemies.forEach((m,i)=>{
   m.y+=m.speed;

   if(attacking && Math.abs(m.y-hero.y)<70 && Math.abs(m.x-hero.x)<60){
      enemies.splice(i,1);
      score+=10;
   } else if(hit(hero,m)){
      enemies.splice(i,1);
      hpv--;
      if(hpv<=0){
         gameOver=true;
         if(score>bestScore){
           localStorage.setItem("hero_best",score);
         }
      }
   } else if(m.y>620){
      enemies.splice(i,1);
      score++;
   }
 });

 coins.forEach((coin,i)=>{
   coin.y+=coin.speed;
   if(hit(hero,{x:coin.x,y:coin.y,s:20})){
      coins.splice(i,1);
      score+=5;
   } else if(coin.y>620){
      coins.splice(i,1);
   }
 });

 levelv=Math.floor(score/50)+1;
 updateHud();
}

function draw(){
 ctx.clearRect(0,0,400,600);

 ctx.font="40px serif";
 ctx.fillText("🧙",hero.x,hero.y+35);

 enemies.forEach(m=>{
   ctx.font="40px serif";
   ctx.fillText(m.e,m.x,m.y+35);
 });

 coins.forEach(coin=>{
   ctx.font="24px serif";
   ctx.fillText("💰",coin.x,coin.y+20);
 });

 if(attacking){
   ctx.font="36px serif";
   ctx.fillText("⚔️",hero.x+30,hero.y+20);
 }

 if(gameOver){
   ctx.fillStyle="white";
   ctx.font="32px sans-serif";
   ctx.fillText("GAME OVER",85,260);
   ctx.font="22px sans-serif";
   ctx.fillText("タップで再開",130,310);
 }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();

c.addEventListener("click",()=>{if(gameOver){location.reload();}});
</script>
</body>
</html>
