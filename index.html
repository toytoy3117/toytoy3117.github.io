<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>勇者の大冒険</title>
<style>
body{margin:0;background:#1f2937;color:#fff;font-family:sans-serif;text-align:center}
#hud{padding:10px;font-weight:bold}
canvas{background:#111827;border:2px solid gold;display:block;margin:0 auto;touch-action:none;max-width:100vw}
#controls{display:flex;justify-content:center;gap:10px;padding:10px}
button{width:90px;height:60px;font-size:28px;border-radius:10px;border:none}
</style>
</head>
<body>
<div id="hud">
❤️HP:<span id="hp">3</span>
| 🏆<span id="score">0</span>
| ⭐Lv:<span id="level">1</span>
| 👑<span id="best">0</span>
</div>

<canvas id="game" width="400" height="600"></canvas>

<div id="controls">
<button id="leftBtn">◀</button>
<button id="attackBtn">⚔️</button>
<button id="rightBtn">▶</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

const hpEl=document.getElementById('hp');
const scoreEl=document.getElementById('score');
const levelEl=document.getElementById('level');
const bestEl=document.getElementById('best');

let leftPressed=false;
let rightPressed=false;
let attacking=false;

let hero={x:180,y:520,size:40};
let enemies=[];
let score=0;
let hp=3;
let level=1;
let gameOver=false;

bestEl.textContent=localStorage.getItem('hero_best') || 0;

function updateHud(){
 hpEl.textContent=hp;
 scoreEl.textContent=score;
 levelEl.textContent=level;
}

function addHold(btn, setter){
 const el=document.getElementById(btn);
 el.addEventListener('touchstart',e=>{e.preventDefault();setter(true);});
 el.addEventListener('touchend',e=>{e.preventDefault();setter(false);});
 el.addEventListener('mousedown',()=>setter(true));
 el.addEventListener('mouseup',()=>setter(false));
 el.addEventListener('mouseleave',()=>setter(false));
}

addHold('leftBtn',v=>leftPressed=v);
addHold('rightBtn',v=>rightPressed=v);

function attack(){
 if(gameOver) return;
 attacking=true;
 setTimeout(()=>attacking=false,250);
}
document.getElementById('attackBtn').addEventListener('click',attack);
document.getElementById('attackBtn').addEventListener('touchstart',e=>{e.preventDefault();attack();});

document.addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft') leftPressed=true;
 if(e.key==='ArrowRight') rightPressed=true;
 if(e.code==='Space') attack();
});
document.addEventListener('keyup',e=>{
 if(e.key==='ArrowLeft') leftPressed=false;
 if(e.key==='ArrowRight') rightPressed=false;
});

function spawnEnemy(){
 const types=['👹','💀','🦇','🐉'];
 enemies.push({
  x:Math.random()*360,
  y:-40,
  emoji:types[Math.floor(Math.random()*types.length)],
  speed:2+level*0.5,
  size:40
 });
}

setInterval(()=>{
 if(!gameOver) spawnEnemy();
},1000);

function intersects(ax,ay,as,bx,by,bs){
 return ax<bx+bs && ax+as>bx && ay<by+bs && ay+as>by;
}

function update(){
 if(gameOver) return;

 if(leftPressed) hero.x-=6;
 if(rightPressed) hero.x+=6;

 hero.x=Math.max(0,Math.min(360,hero.x));

 for(let i=enemies.length-1;i>=0;i--){
   const e=enemies[i];
   e.y+=e.speed;

   if(attacking &&
      Math.abs(e.x-hero.x)<60 &&
      Math.abs(e.y-hero.y)<70){
      enemies.splice(i,1);
      score+=10;
      continue;
   }

   if(intersects(hero.x,hero.y,hero.size,e.x,e.y,e.size)){
      enemies.splice(i,1);
      hp--;
      if(hp<=0){
        gameOver=true;
        const best=Math.max(score,Number(localStorage.getItem('hero_best')||0));
        localStorage.setItem('hero_best',best);
      }
      continue;
   }

   if(e.y>620){
      enemies.splice(i,1);
      score++;
   }
 }

 level=Math.floor(score/50)+1;
 updateHud();
}

function draw(){
 ctx.clearRect(0,0,400,600);

 ctx.font='40px serif';
 ctx.fillText('🧙',hero.x,hero.y+35);

 enemies.forEach(e=>{
   ctx.font='40px serif';
   ctx.fillText(e.emoji,e.x,e.y+35);
 });

 if(attacking){
   ctx.font='30px serif';
   ctx.fillText('⚔️',hero.x+30,hero.y+15);
 }

 if(gameOver){
   ctx.fillStyle='white';
   ctx.font='30px sans-serif';
   ctx.fillText('GAME OVER',90,260);
   ctx.font='20px sans-serif';
   ctx.fillText('画面をタップして再開',95,300);
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

canvas.addEventListener('click',()=>{
 if(gameOver) location.reload();
});
</script>
</body>
</html>
